<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Shopee</title>

  <link rel="icon" type="image/png" href="logo.png">

  <link rel="stylesheet" href="style.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- Choices -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
</head>

<body>

<!-- LOADING -->
<div id="loading" class="loading hidden">
  Carregando dados...
</div>

<header class="header">
  <div class="container header-content">

    <!-- ESQUERDA -->
    <div class="left-area">
      <img src="logo1.png" alt="Shopee Logo">

      <div class="text-area">
        <h1>Dashboard Logístico</h1>
        <span>Operações Shopee</span>
      </div>
    </div>

    <!-- DIREITA -->
    <div class="right-area">

      <div class="status">
        <span class="dot"></span>
        Sistema Online
      </div>

      <div class="date" id="currentDate">
        --
      </div>

      <div class="user">
        <div class="avatar">T</div>
        <span>Thais Silva</span>
      </div>

    </div>

  </div>
</header>

<!-- FILTROS -->
<div class="filters">

  <div class="filter-group">
    <label>Importar CSV</label>
    <input type="file" id="fileInput" accept=".csv">
  </div>

  <div class="filter-group">
    <label>Cidade</label>
    <select id="cityFilter">
      <option value="">Todas cidades</option>
    </select>
  </div>

  <div class="filter-group">
    <label>Estação</label>
    <select id="stationFilter">
      <option value="">Todas estações</option>
    </select>
  </div>

  <div class="filter-group">
    <label>Station Name</label>
    <select id="stationNameFilter">
      <option value="">Todos</option>
    </select>
  </div>

  <div class="filter-group">
    <label>&nbsp;</label>
    <button onclick="applyFilters()">Filtrar</button>
  </div>

  <div class="filter-group">
    <label>&nbsp;</label>
    <button onclick="clearFilters()">Limpar</button>
  </div>

  <div class="filter-group">
  <label>&nbsp;</label>
  <button onclick="copyBRs()" style="background:#22c55e;">📋 Copiar BRs</button>
</div>

</div>

<div class="container">

  <section class="cards">
    <div class="card">
      <h3>Total Pedidos</h3>
      <p id="totalPedidos">0</p>
    </div>

    <div class="card">
      <h3>Dentro do SLA</h3>
      <p id="slaDentro">0%</p>
    </div>

    <div class="card">
      <h3>Fora do SLA</h3>
      <p id="slaFora">0%</p>
    </div>

    <div class="card">
      <h3>📦 Pacotes OnHold</h3>
      <p id="hold">0</p>
    </div>
  </section>

  <section class="charts">
    <div class="chart-box">
      <canvas id="cidadesChart"></canvas>
    </div>

    <div class="chart-box">
      <canvas id="slaChart"></canvas>
    </div>

    <div class="top-cities">
  <h3>🏆 Top 5 Cidades</h3>
  <ul id="topCitiesList"></ul>
</div>



  </section>



</div>

<script src="script.js"></script>

</body>
</html>
